spring:
  application:
    name: transaction-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433:transaction_db}
    username: ${DATASOURCE_USERNAME:user}
    password: ${DATASOURCE_PASSWORD:secret}

  jpa:
    hibernate:
      ddl-auto: create-drop


eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka

server:
  port: 0