services:

  profile-db:
    image: postgres:18-alpine3.23
    container_name: profile-db
    environment:
      - POSTGRES_DB=profile_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
      - PGDATA=/data/postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-profile:/data/postgres
    restart: unless-stopped

  transaction-db:
    image: postgres:18-alpine3.23
    container_name: transaction-db
    environment:
      - POSTGRES_DB=transaction_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
      - PGDATA=/data/postgres
    ports:
      - "5433:5433"
    command: -p 5433
    volumes:
      - ./postgres-transaction:/data/postgres
    restart: unless-stopped

  currency-db:
    image: postgres:18-alpine3.23
    container_name: currency-db
    environment:
      - POSTGRES_DB=currency_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
      - PGDATA=/data/postgres
    ports:
      - "5434:5434"
    command: -p 5434
    volumes:
      - ./postgres-currency:/data/postgres
    restart: unless-stopped

  account-db:
    image: postgres:18-alpine3.23
    container_name: account-db
    environment:
      - POSTGRES_DB=account_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
      - PGDATA=/data/postgres
    ports:
      - "5435:5435"
    command: -p 5435
    volumes:
      - ./postgres-account:/data/postgres
    restart: unless-stopped

  discovery-server:
    container_name: discovery-server
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - 8761
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-","http://localhost:8761/eureka/apps" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    expose:
      - 8080
    depends_on:
      discovery-server:
        condition: service_healthy

  profile-service:
    container_name: profile-service
    build:
      context: .
      dockerfile: profile-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://profile-db:5432/profile_db
    depends_on:
      - profile-db
      - discovery-server
      - api-gateway

  transaction-service:
    container_name: transaction-service
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://transaction-db:5433/transaction_db
    depends_on:
      - transaction-db
      - discovery-server
      - api-gateway

  currency-service:
    container_name: currency-service
    build:
      context: .
      dockerfile: currency-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://currency-db:5434/currency_db
    depends_on:
      - currency-db
      - discovery-server
      - api-gateway
      - redis

  account-service:
    container_name: account-service
    build:
      context: .
      dockerfile: account-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://account-db:5435/account_db
    depends_on:
      - account-db
      - discovery-server
      - api-gateway

  redis:
    image: "redis:8.4.0"
    ports:
      - "6379:6379"
