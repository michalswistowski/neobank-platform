spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate.ddl-auto: create-drop
    show-sql: true

  cloud:
    discovery:
      enabled: false
h2:
  console:
    enabled: true


eureka:
  client:
    enabled: false
    fetch-registry: false
    register-with-eureka: false