spring:
  application:
    name: currency-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434:currency_db}
    username: ${DATASOURCE_USERNAME:user}
    password: ${DATASOURCE_PASSWORD:secret}

  data:
    redis:
      host: redis
      port: 6379

  jpa:
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka

server:
  port: 0

logging:
  level:
    org:
      springframework:
        cache: TRACE